extends: default
role:
  love:
    font-color: #333333

  wild:
    font-color: 222222
    text-transform: uppercase
    font-style: italic
    background-color: BCD637
    border-offset: 1.5

header:
  font_color: 999999
  height: 0.8in
  padding: [ 10, 3, 0, 3 ]
  recto:
    columns: "<40% =20% >40%"
    right:
      content: '_{organization}_'
    center:
      content: image:../images/log.png[pdfwidth=1.25in]
  verso:
    columns: $header_recto_columns
    left:
      content: $header_recto_right_content
    center:
      content: $header_recto_center_content
footer:
  height: 0.45in
  recto:
    right:
      content: '{section-or-chapter-title} | {page-number}'
  verso:
    left:
      content: '{page-number} | {chapter-title}'




page:
  layout: portrait
  margin: [ 1.2in, 0.67in, 1in, 0.67in ]
  size: Letter



